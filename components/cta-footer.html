    CTA + Footer Component
    To use in a page:
      1. <link rel="stylesheet" href="components/cta-footer.css"> in <head>
      2. <link rel="preconnect" href="https://cdn.lottielab.com"> in <head>
      3. <section class="cta-footer-section reveal">

        </div>
        <!-- Lottie animation -->
        <div class="cta-shax-lottie">
          <iframe
            src="https://cdn.lottielab.com/l/59mGokKhxq8TV5.html"
            allowtransparency="true"
            loading="lazy"
            title="NUA animation">
          </iframe>
        </div>
      </div>
    </div>
