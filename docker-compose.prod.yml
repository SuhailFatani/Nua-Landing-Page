version: '3.9'

services:

  # ── Neo4j Graph Database ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: nua_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nua_net
    # No ports exposed — only accessible from backend via internal network

  # ── Django Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nua_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - NEO4J_BOLT_URL=bolt://neo4j:${NEO4J_PASSWORD}@neo4j:7687
    ports:
      - "8000:8000"
    volumes:
      - media_uploads:/app/uploads
    depends_on:
      neo4j:
        condition: service_healthy
    user: django
    command: >
      sh -c "python manage.py seed_db &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 4
             --worker-class gthread
             --threads 2
             --timeout 120
             --access-logfile -
             --error-logfile -"
    networks:
      - nua_net

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: nua_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL}
      - NEXT_PUBLIC_SITE_URL=${SITE_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - nua_net

volumes:
  neo4j_data:
  neo4j_logs:
  media_uploads:

networks:
  nua_net:
    driver: bridge
